services:
  # Nginx 反向代理 + 前端静态文件
  nginx:
    build:
      context: ..
      dockerfile: config/Dockerfile
    container_name: drawwork-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../data/uploads:/var/www/uploads:ro
      - ../logs/nginx:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
      yjs:
        condition: service_healthy
    networks:
      - drawwork-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # API 后端服务
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: drawwork-api
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-drawwork123}@postgres:5432/${DB_NAME:-drawwork}
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio
    volumes:
      - ../logs/api:/app/logs
      - ../data/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - drawwork-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Yjs WebSocket 服务
  yjs:
    build:
      context: ../yjs-server
      dockerfile: Dockerfile
    container_name: drawwork-yjs
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-drawwork123}@postgres:5432/${DB_NAME:-drawwork}
      - REDIS_URL=redis://redis:6379
      - API_URL=http://api:3000
    volumes:
      - ../logs/yjs:/app/logs
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - drawwork-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: drawwork-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-drawwork123}
      - POSTGRES_DB=${DB_NAME:-drawwork}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ../backups:/backups
    networks:
      - drawwork-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-drawwork}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=64MB
      -c work_mem=4MB

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: drawwork-redis
    volumes:
      - ../data/redis:/data
    networks:
      - drawwork-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # Minio 文件存储
  minio:
    image: minio/minio:latest
    container_name: drawwork-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - ../data/minio:/data
    networks:
      - drawwork-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # 数据库管理工具（可选，默认不启动）
  adminer:
    image: adminer
    container_name: drawwork-adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - drawwork-network
    restart: always
    profiles: ["admin"]

networks:
  drawwork-network:
    driver: bridge
